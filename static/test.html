<!DOCTYPE html>
<html>
  <meta charset="utf-8">
  <title>QUnit</title>
  <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.25.0.css">
  <body>
    <div id="qunit"></div>
    <div id="qunit-fixture"></div>
    <script src="https://code.jquery.com/qunit/qunit-2.25.0.js"></script>
    <!-- <script src="your_app.test.js"></script> -->
    <script>
      function add(a, b) {
        return a + b;
      }
      function sub(a,b) {
        return a - b;
      }

      QUnit.module('math', function() {
        QUnit.test('two numbers', function(assert) {
          assert.equal(add(1, 2), 3);
        });
        QUnit.test('sub 2', (chk)=> {
          chk.equal(sub(3,4),-1);
          chk.equal(sub(43,3),40);
        });
      });
    </script>
  </body>
</html>
